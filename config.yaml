# Target keywords to detect and click (case-insensitive)
# These are merged with auto-learned keywords from img/ folder at startup.
keywords:
  - "ACCEPTED"
  - "Allow Once"
  - "Run"
  - "Retry"
  - "OK"

# Scan interval in milliseconds (1500ms = 1.5s is optimal for fast clicks without hogging CPU)
scan_interval_ms: 3600

#tối đa 3 clicks trên mỗi lần quét
maxClicksPerScan: 20

# Minimum OCR confidence (0-100) to consider a match valid.
# Lower = catch more (may include noise). 40 is balanced.
confidence_threshold: 40

# Log configuration (debug, info, error)
log_level: "debug"

# Background stealth click (true = PostMessage, false = physical mouse click)
# NOTE: PostMessage does NOT work with browsers. Use false for browser testing.
use_background_click: false

# Optional: Fixed scan region to skip interactive selection at startup.
# Format: "x,y,width,height" in pixels.
# Remove or comment out to use interactive drag-selection.
# Example: scan_region: "100,200,800,600"
# scan_region: ""
