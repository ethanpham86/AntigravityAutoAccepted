# Target keywords to detect and click (case-insensitive)
# These are merged with auto-learned keywords from img/ folder at startup.
keywords:
  - "ACCEPTED"
  - "Allow Once"
  - "Run"
  - "Retry"
  - "OK"

# Scan interval in milliseconds (3000ms = 3s is optimal for fast clicks without hogging CPU)
scan_interval_ms: 3000

# Tốc độ chờ sau mỗi cú click (tính bằng mili-giây) nếu bot click nhiều nút trong cùng 1 đợt quét.
# Mặc định: 300. Tăng lên 1000 nếu thấy nó cướp chuột quá nhanh liên tục.
click_delay_ms: 300

# tối đa X clicks trên mỗi lần quét để chống giật lag (mặc định 10)
max_clicks_per_scan: 10

# Bán kính tự động bỏ qua nếu phát hiện nút trùng lặp (tính bằng pixel). Mặc định: 80
dedup_radius_px: 80

# Tỉ lệ khớp ảnh chính xác tối thiểu (0.0 đến 1.0) khi học từ thư mục img/
# Mặc định: 0.92 (92%). Nếu quá thấp sẽ nhận diện bậy bạ.
template_threshold: 0.92

# Minimum OCR confidence (0-100) to consider a match valid.
# Lower = catch more (may include noise). 40 is balanced.
confidence_threshold: 40

# Log configuration (debug, info, error)
log_level: "debug"

# Background stealth click (true = PostMessage, false = physical mouse click)
# NOTE: PostMessage does NOT work with browsers. Use false for browser testing.
use_background_click: false

# Optional: Fixed scan region to skip interactive selection at startup.
# Format: "x,y,width,height" in pixels.
# Remove or comment out to use interactive drag-selection.
# Example: scan_region: "100,200,800,600"
# scan_region: ""
